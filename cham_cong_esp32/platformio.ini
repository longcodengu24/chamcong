; Máy chấm công ESP32 + RFID RC522
; PlatformIO tự động tải các thư viện trong lib_deps, không cần cài tay

[env:esp32dev]
platform = espressif32
board = esp32dev          ; nếu dùng board khác (VD: ESP32-S3, NodeMCU-32S) thì đổi ở đây
framework = arduino
monitor_speed = 115200

lib_deps =
    miguelbalboa/MFRC522@^1.4.11
    bblanchon/ArduinoJson@^7.0.4

; WiFiClientSecure và HTTPClient đã có sẵn trong ESP32 Arduino core, không cần cài thêm
build_flags =
    -DCORE_DEBUG_LEVEL=1

; Nếu nạp code bị lỗi, thử bỏ comment dòng dưới và điền đúng cổng COM
; upload_port = COM3
; monitor_port = COM3
